<div class="gemini-sidebar">

    <!-- ── Brand Header ──────────────────────────────────────────────── -->
    <div class="px-4 py-6 flex justify-content-center align-items-center text-center border-bottom-1" style="border-color: #2e2f30;">
        <span class="text-2xl font-bold text-white">ERP-Santi</span>
    </div>

    <!-- ── Navigation Menu (grows, scrollable only if needed) ─────────── -->
    <div class="flex-grow-1 px-2 py-4 overflow-y-auto custom-scrollbar">
        <ul class="list-none p-0 m-0 flex flex-column gap-2">
            @for (item of menuItems; track item.label) {
                @if (!item.permissions) {
                <li class="px-2">
                    <a pRipple [routerLink]="item.routerLink" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact: true}" class="gemini-item p-ripple">
                        <i [class]="item.icon + ' gemini-icon'"></i>
                        <span class="font-medium">{{ item.label }}</span>
                    </a>
                </li>
                } @else {
                <li class="px-2" *appHasPermission="item.permissions || []">
                    <a pRipple [routerLink]="item.routerLink" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact: true}" class="gemini-item p-ripple">
                        <i [class]="item.icon + ' gemini-icon'"></i>
                        <span class="font-medium">{{ item.label }}</span>
                    </a>
                </li>
                }
            }
        </ul>
    </div>

    <!-- ── Bottom: Logout + Version ──────────────────────────────────── -->
    <div class="px-2 pb-4 mt-auto flex flex-column gap-2">
        <!-- Divider -->
        <div style="height:1px; background:#2e2f30; margin-bottom: 0.5rem;"></div>

        <!-- Cerrar Sesión -->
        <div class="px-2">
            <a pRipple routerLink="/login"
                class="gemini-item p-ripple logout-item">
                <i class="pi pi-power-off gemini-icon"></i>
                <span class="font-medium">Cerrar Sesión</span>
            </a>
        </div>

        <!-- Version centered -->
        <div class="text-center text-xs mt-2" style="color: #555;">
            v0.7.3 &bull; ERS Santi
        </div>
    </div>

</div>
