<div class="p-4">
    <div class="mb-5 flex align-items-center">
        <p-avatar icon="pi pi-user" size="xlarge" shape="circle" class="mr-3 p-avatar-xl"></p-avatar>
        <div>
            <h1 class="m-0 text-3xl font-bold">{{ userInfo.fullName }}</h1>
            <span class="text-500 text-lg">&#64;{{ userInfo.username }}</span>
        </div>
    </div>

    <p-card header="Información del Usuario" styleClass="shadow-2 border-round-xl">
        <div class="grid mt-2">
            <div class="col-12 md:col-6 mb-3">
                <p-fieldset legend="Nombre Completo" styleClass="h-full">
                    <span class="block text-900 text-xl font-semibold">{{ userInfo.fullName }}</span>
                </p-fieldset>
            </div>
            <div class="col-12 md:col-6 mb-3">
                <p-fieldset legend="Usuario" styleClass="h-full">
                    <span class="block text-900 text-xl font-semibold">{{ userInfo.username }}</span>
                </p-fieldset>
            </div>
            <div class="col-12 md:col-6 mb-3">
                <p-fieldset legend="Correo Electrónico" styleClass="h-full">
                    <span class="block text-900 text-xl font-semibold">{{ userInfo.email }}</span>
                </p-fieldset>
            </div>
            <div class="col-12 md:col-6 mb-3">
                <p-fieldset legend="Dirección" styleClass="h-full">
                    <span class="block text-900 text-xl font-semibold">{{ userInfo.address }}</span>
                </p-fieldset>
            </div>
            <div class="col-12 md:col-4 mb-3">
                <p-fieldset legend="Fecha de Nacimiento" styleClass="h-full">
                    <span class="block text-900 text-xl font-semibold">{{ userInfo.birthDate }}</span>
                </p-fieldset>
            </div>
            <div class="col-12 md:col-4 mb-3">
                <p-fieldset legend="Edad" styleClass="h-full">
                    <span class="block text-900 text-xl font-semibold">{{ userInfo.age }} años</span>
                </p-fieldset>
            </div>
            <div class="col-12 md:col-4 mb-3">
                <p-fieldset legend="Teléfono" styleClass="h-full">
                    <span class="block text-900 text-xl font-semibold">{{ userInfo.phone }}</span>
                </p-fieldset>
            </div>
        </div>
    </p-card>
</div>
