<div class="gemini-layout">

    <!-- ── Sidebar Drawer ──────────────────────────────────────────────── -->
    <p-drawer [(visible)]="sidebarVisible" styleClass="p-0 border-none" [showCloseIcon]="false">
        <app-sidebar></app-sidebar>
    </p-drawer>

    <!-- ── Right Panel: Navbar + Main Content ────────────────────────── -->
    <div class="right-panel">
        <!-- Sticky Navbar -->
        <app-navbar (toggleSidebar)="toggleSidebar()"></app-navbar>

        <!-- Scrollable main content -->
        <main class="gemini-main-content custom-scrollbar">
            <router-outlet></router-outlet>
        </main>
    </div>

</div>
